<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>
</head>
<body>
    <div class="container">
        <div class="input" id="input-div">
            <input class="inputfield" type="text" id="city-input" placeholder="Enter City Name">
            <button class="btn" id="weather">Get Weather</button>
        </div>
        <div class="output" id="output-div">
            <h2 class="city-name" id="city-name">Getting Weather Details for ...</h2>
            <p class="temperature" id="temperature"> Temperature: </p> 
            <p class="description" id="description"> Description: </p> 
            <p class="humidity" id="humidity"> Humidity: </p> 
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
